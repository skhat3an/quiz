{q:"Listing positive outcomes refers to:",o:["A) Dealing with risk","B) Attitude adjustment"],a:"B"},
{q:"Thinking outside the box refers to:",o:["A) Dealing with risk","B) Encouraging creativity"],a:"B"},
{q:"Thinking is the movement of the mind from the unknown to the known.",o:["A) True","B) False"],a:"B",tf:true},
{q:"Thinking can only be expressed verbally.",o:["A) True","B) False"],a:"B",tf:true},
{q:"Using a mascot for luck is emotional thinking.",o:["A) True","B) False"],a:"B",tf:true},
{q:"Opposing promotion due to dislike is emotional thinking.",o:["A) True","B) False"],a:"A",tf:true},
{q:"Axiom and repetition are characteristics of scientific thinking.",o:["A) True","B) False"],a:"B",tf:true},

{q:"Logical thinking improves natural thinking by controlling excesses.",o:["A) True","B) False"],a:"A",tf:true},

function shuffle(a){var b=[...a];for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

var questions=shuffle(qs);
var cur=0,score=0,done=false;

function render(){
  var root=document.getElementById('root');
  if(cur>=questions.length){
    var pct=Math.round(score/questions.length*100);
    var msg=pct>=80?'Excellent!':pct>=60?'Good effort!':'Keep studying!';
    root.innerHTML='<div style="text-align:center;padding:2rem 0;">'
      +'<div style="font-size:42px;font-weight:500;color:var(--color-text-primary);">'+score+'/'+questions.length+'</div>'
      +'<div style="font-size:15px;color:var(--color-text-secondary);margin:8px 0 24px;">'+pct+'% &mdash; '+msg+'</div>'
      +'<button onclick="restart()" style="padding:10px 28px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);font-size:15px;cursor:pointer;">Try again</button>'
      +'</div>';
    return;
  }
  var q=questions[cur];
  var pct=Math.round(cur/questions.length*100);
  var html='<div style="height:4px;background:var(--color-background-secondary);border-radius:2px;margin-bottom:20px;">'
    +'<div style="height:4px;background:#378ADD;border-radius:2px;width:'+pct+'%;transition:width 0.3s;"></div></div>'
    +'<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;">Question '+(cur+1)+' of '+questions.length+' &nbsp;&middot;&nbsp; Score: '+score+(q.tf?' &nbsp;&middot;&nbsp; True / False':'')+'</div>'
    +'<div style="font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:20px;line-height:1.6;">'+q.q+'</div>'
    +'<div id="opts">';
  q.o.forEach(function(opt,i){
    html+='<button id="ob'+i+'" onclick="pick(\''+opt[0]+'\')" style="display:block;width:100%;text-align:left;padding:11px 14px;margin-bottom:8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:15px;cursor:pointer;">'+opt+'</button>';
  });
  html+='</div><div id="fb" style="font-size:14px;font-weight:500;min-height:22px;margin:12px 0 8px;"></div>'
    +'<button id="nb" onclick="next()" style="display:none;padding:9px 22px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);font-size:14px;cursor:pointer;">'+(cur+1<questions.length?'Next &rarr;':'See results &rarr;')+'</button>';
  root.innerHTML=html;
}

function pick(letter){
  if(done)return;
  done=true;
  var q=questions[cur];
  var correct=letter===q.a;
  if(correct)score++;
  q.o.forEach(function(opt,i){
    var btn=document.getElementById('ob'+i);
    btn.disabled=true;
    if(opt[0]===q.a){btn.style.background='var(--color-background-success)';btn.style.borderColor='var(--color-border-success)';btn.style.color='var(--color-text-success)';}
    else if(opt[0]===letter&&!correct){btn.style.background='var(--color-background-danger)';btn.style.borderColor='var(--color-border-danger)';btn.style.color='var(--color-text-danger)';}
  });
  var fb=document.getElementById('fb');
  if(correct){fb.textContent='Correct!';fb.style.color='var(--color-text-success)';}
  else{fb.textContent='Incorrect. The correct answer is: '+q.a+') '+q.o.find(function(o){return o[0]===q.a;}).slice(3);fb.style.color='var(--color-text-danger)';}
  document.getElementById('nb').style.display='inline-block';
}

function next(){done=false;cur++;render();}
function restart(){questions=shuffle(qs);cur=0;score=0;done=false;render();}

render();
</script>
